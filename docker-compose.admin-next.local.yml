# Local testing overlay for the React admin — exposes it on host port 8082
# (legacy admin stays on 8081). Traefik labels are ignored locally.
#   docker compose -f docker-compose.yml -f docker-compose.local.yml \
#     -f docker-compose.admin-next.yml -f docker-compose.admin-next.local.yml up --build admin-next
services:
  admin-next:
    ports:
      - "8082:80"
