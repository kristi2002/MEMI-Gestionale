<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Pagina non trovata</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8f5f2;color:#3B2B2B;
         display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
    .wrap{max-width:420px}
    h1{font-size:5rem;font-weight:200;letter-spacing:.05em;color:#c9897a;line-height:1}
    h2{font-size:1.1rem;font-weight:400;margin:.75rem 0 1.25rem}
    p{font-size:.88rem;color:#7a6060;line-height:1.7;margin-bottom:1.75rem}
    a{display:inline-block;padding:.65rem 1.5rem;background:#3B2B2B;color:#fff;
      text-decoration:none;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;border-radius:2px}
    a:hover{background:#5a3f3f}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <h2>Pagina non trovata</h2>
    <p>La risorsa che stai cercando non esiste o è stata spostata.</p>
    <a href="/">Torna alla dashboard</a>
  </div>
</body>
</html>
