<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="memi-api" content="/api" />
  <title>Il tuo carrello · Memi Abbigliamento</title>
  <meta name="description" content="Rivedi i capi nel tuo carrello Memi Abbigliamento e procedi al checkout in modo sicuro." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css?v=70c280df" />
  <link rel="stylesheet" href="app.css?v=ece23419" />
  <style>
    body{font-family:var(--font-sans);background:var(--cream);color:var(--espresso);line-height:1.65;-webkit-font-smoothing:antialiased;}
    /* Page-scoped reset for THIS page's own controls. The site header +
       announcement bar are styled centrally in app.css (shared by all pages). */
    *,*::before,*::after{box-sizing:border-box;}
    button{font:inherit;background:none;border:none;cursor:pointer;color:inherit;appearance:none;-webkit-appearance:none;}
    a{color:inherit;text-decoration:none;}
    img{max-width:100%;display:block;}

    /* ── Compact "above the fold" shell ──────────────────────────────────
       Header (announcement 32px + nav 64px ≈ 96px) + this page must fit a
       1-2 item cart inside a ~760px viewport with zero scroll: the eyebrow
       is gone, the title is one line, and every vertical gap below is cut
       to the minimum that still reads as breathing room, not clutter. */
    .page-wrap{max-width:1160px;margin:0 auto;padding:clamp(14px,2vw,20px) clamp(16px,4vw,40px) 56px;}
    .page-head{margin-bottom:clamp(14px,2vw,20px);display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
    .page-title{font-family:var(--font-serif);font-size:clamp(1.5rem,2.6vw,2rem);font-weight:400;line-height:1.05;}
    .page-title em{font-style:italic;color:var(--blush-dark,#b98a8a);}
    .page-count{font-size:.82rem;color:var(--brown-light,#a08d80);font-weight:500;}

    .cart-layout{display:grid;grid-template-columns:1fr;gap:clamp(18px,3vw,32px);}
    @media(min-width:900px){.cart-layout{grid-template-columns:1.6fr .9fr;align-items:start;}}

    /* ── Product lines — elevated card, soft shadow instead of a flat
       border, gentle hover lift + image zoom, icon-based remove control. ── */
    .cart-lines{display:flex;flex-direction:column;gap:12px;}
    .cline{display:grid;grid-template-columns:88px 1fr auto;gap:16px;background:var(--white,#fff);
      border:1px solid var(--cream-dark,#ece7e0);border-radius:16px;padding:14px;align-items:center;
      box-shadow:var(--shadow-xs);transition:box-shadow .25s var(--ease-out,ease),transform .25s var(--ease-out,ease),border-color .25s;}
    .cline:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:transparent;}
    .cline-img{width:88px;aspect-ratio:3/4;border-radius:11px;overflow:hidden;background:var(--blush-light,#f6ecec);position:relative;}
    .cline-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .5s var(--ease-out,ease);}
    .cline:hover .cline-img img{transform:scale(1.06);}
    .cline-info{display:flex;flex-direction:column;gap:9px;min-width:0;}
    .cline-name{font-family:var(--font-serif);font-size:1.08rem;font-weight:500;color:var(--espresso);line-height:1.3;}
    .cline-name a{color:inherit;text-decoration:none;background-image:linear-gradient(currentColor,currentColor);
      background-size:0 1px;background-repeat:no-repeat;background-position:0 100%;transition:background-size .25s;}
    .cline-name a:hover{background-size:100% 1px;}
    .cline-tags{display:flex;flex-wrap:wrap;gap:6px;}
    .cline-tag{font-size:.68rem;padding:3px 10px;border-radius:20px;background:var(--sage-light,#EAF1E0);color:var(--sage-dark,#5F7A3F);font-weight:500;}
    .cline-tag.none{background:#f4f0ea;color:var(--brown-light,#a08d80);font-style:italic;font-weight:400;}
    .qty{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--cream-dark,#e2dcd4);border-radius:22px;padding:2px;width:max-content;background:var(--cream,#F7F5F0);}
    .qty button{width:26px;height:26px;border:none;background:none;cursor:pointer;font-size:1rem;color:var(--espresso);border-radius:50%;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;}
    .qty button:hover{background:var(--white);color:var(--blush-dark,#6B6BA3);}
    .qty span{min-width:22px;text-align:center;font-size:.86rem;font-weight:500;}
    .cline-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;height:100%;justify-content:space-between;}
    .cline-price{font-family:var(--font-serif);font-size:1.15rem;font-weight:600;color:var(--espresso);white-space:nowrap;}
    .cline-remove{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      background:none;border:none;cursor:pointer;color:var(--brown-light,#a08d80);transition:background .15s,color .15s;}
    .cline-remove:hover{background:var(--blush-light,#f6ecec);color:var(--blush-dark,#b98a8a);}
    .cline-remove svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;}

    .summary{background:var(--white,#fff);border:1px solid var(--cream-dark,#ece7e0);border-radius:18px;padding:clamp(18px,2.4vw,24px);position:sticky;top:16px;box-shadow:var(--shadow-xs);}
    .summary h2{font-family:var(--font-serif);font-size:1.2rem;font-weight:400;margin-bottom:1rem;}
    .sum-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:.65rem;color:var(--brown-mid,#6b5050);}
    .sum-row.total{font-size:1.1rem;font-weight:600;color:var(--espresso);border-top:1px solid var(--cream-dark,#ece7e0);padding-top:.85rem;margin-top:.85rem;}
    .ship-bar{height:6px;border-radius:6px;background:var(--blush-light,#f6ecec);overflow:hidden;margin:.35rem 0 .55rem;}
    .ship-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--sage-dark,#5F7A3F),var(--sage,#D5E4C3));transition:width .4s;}
    .ship-note{font-size:.75rem;color:var(--brown-light,#a08d80);margin-bottom:1.1rem;}
    .ship-note strong{color:var(--espresso);}
    .ship-note .ok{color:#5F7A3F;font-weight:500;}
    .btn-co{display:block;width:100%;text-align:center;padding:.9rem;background:var(--espresso,#3b2b2b);color:#fff;border-radius:11px;text-decoration:none;font-size:.86rem;font-weight:500;letter-spacing:.04em;transition:background .2s,transform .2s;border:none;cursor:pointer;box-shadow:var(--shadow-sm);}
    .btn-co:hover{background:var(--blush-dark,#6B6BA3);transform:translateY(-1px);}

    /* ── Checkout rapido — real wallet-brand pills instead of plain
       bordered text buttons, with a proper "oppure" divider. ── */
    .express-label{display:flex;align-items:center;gap:10px;text-align:center;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brown-light,#a08d80);margin:1.2rem 0 .7rem;}
    .express-label::before,.express-label::after{content:'';flex:1;height:1px;background:var(--cream-dark,#e8e2da);}
    .express-row{display:flex;gap:.5rem;}
    .express-row button{flex:1;height:42px;border-radius:11px;border:1.5px solid var(--cream-dark,#DBDBEE);background:#fff;cursor:pointer;
      font-size:.74rem;font-weight:700;letter-spacing:.01em;display:flex;align-items:center;justify-content:center;gap:5px;
      transition:border-color .18s,transform .18s,box-shadow .18s;}
    .express-row button:hover{transform:translateY(-1px);box-shadow:var(--shadow-xs);}
    .express-row .apple{background:#fff;color:#000;border-color:#000;}
    .express-row .apple:hover{background:#f5f5f5;border-color:#000;}
    .express-row .apple svg{width:13px;height:13px;fill:#000;}
    .express-row .gpay{color:#3c4043;border-color:var(--cream-dark,#DBDBEE);}
    .express-row .gpay:hover{border-color:#8f8fc1;}
    .express-row .gpay .g-blue{color:#4285F4;} .express-row .gpay .g-red{color:#EA4335;}
    .express-row .gpay .g-yellow{color:#FBBC05;} .express-row .gpay .g-green{color:#34A853;}
    .express-row .paypal{color:#003087;border-color:var(--cream-dark,#DBDBEE);}
    .express-row .paypal:hover{border-color:#003087;}
    .express-row .paypal em{font-style:italic;font-weight:800;color:#009cde;}
    .cart-cont{display:block;text-align:center;margin-top:.9rem;font-size:.8rem;color:var(--brown-mid,#6b5050);text-decoration:underline;text-underline-offset:3px;}

    .cart-empty{text-align:center;padding:clamp(40px,8vw,72px) 1rem;}
    .cart-empty svg{width:52px;height:52px;stroke:var(--blush,#e6c6c6);fill:none;stroke-width:1.3;margin-bottom:1.1rem;}
    .cart-empty h2{font-family:var(--font-serif);font-size:1.5rem;font-weight:300;margin-bottom:.5rem;}
    .cart-empty p{color:var(--brown-light,#a08d80);font-size:.9rem;margin-bottom:1.6rem;}
    .cart-cta{display:inline-block;padding:.8rem 2.2rem;background:var(--espresso,#3b2b2b);color:#fff;border-radius:9px;text-decoration:none;font-size:.82rem;letter-spacing:.05em;}
    .cart-cta:hover{background:var(--blush-dark,#b98a8a);}

  </style>
</head>
<body>
  <div class="announcement-bar">✦ &nbsp;Spedizione gratuita su ordini superiori a €100 &nbsp;✦&nbsp; Reso gratuito entro 30 giorni &nbsp;✦</div>
  <div data-include="site-header"></div>
  <main class="page-wrap">
    <div class="page-head">
      <h1 class="page-title">Il tuo <em>carrello</em></h1>
      <span class="page-count" id="pageCount"></span>
    </div>
    <div id="cartRoot"></div>
  </main>

  <script src="api-client.js?v=7"></script>
  <script src="app.js?v=34"></script>
  <script>
  (function () {
    'use strict';
    var SIZELESS = ['gioielli','borse','cinture','accessori','bijoux'];
    var FREE_SHIP = 100, STANDARD = 5.90;
    var products = [];

    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function money(n){ return '€'+(Number(n)||0).toFixed(2).replace('.',','); }
    function loadCart(){ try{ return JSON.parse(localStorage.getItem('memi_cart'))||[]; }catch(_){ return []; } }
    function resolveProduct(id){ if(!id) return null; for(var i=0;i<products.length;i++){ var p=products[i]; if(id===p.id||id.indexOf(p.id+'-')===0) return p; } return null; }
    function imgOf(p){ if(!p||!Array.isArray(p.images)||!p.images.length) return ''; var x=p.images[0]; return typeof x==='string'?x:(x.card||x.full||x.thumb||''); }
    function catOf(p){ return p?String(p.categoria||'').toLowerCase():''; }

    // Honest placeholder for products with no uploaded image (mirrors the cart drawer).
    var NO_IMAGE = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800"><rect width="600" height="800" fill="#f1ece6"/><rect x="225" y="300" width="150" height="120" rx="10" fill="none" stroke="#BEBEDD" stroke-width="6"/><circle cx="268" cy="338" r="13" fill="none" stroke="#BEBEDD" stroke-width="6"/><path d="M232 414 L300 358 L338 392 L368 366 L368 418 Z" fill="#BEBEDD"/></svg>');
    try { if (!window.MEMI_NO_IMAGE) window.MEMI_NO_IMAGE = NO_IMAGE; } catch (_) {}
    function phBox(key){
      return '<div class="ph '+(key||'ph-blush')+'" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">' +
        '<svg viewBox="0 0 60 80" fill="none" style="width:58%"><ellipse cx="30" cy="14" rx="10" ry="11" fill="white" opacity=".45"/><path d="M8 80 C8 55 52 55 52 80" fill="white" opacity=".45"/><rect x="14" y="26" width="32" height="34" rx="5" fill="white" opacity=".45"/></svg></div>';
    }

    function render(){
      var cart = loadCart();
      var root = document.getElementById('cartRoot');
      if(!cart.length){
        var countElEmpty = document.getElementById('pageCount');
        if (countElEmpty) countElEmpty.textContent = '';
        root.innerHTML =
          '<div class="cart-empty"><svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>' +
          '<h2>Il carrello è vuoto</h2><p>Aggiungi qualcosa di bello per iniziare.</p>' +
          '<a class="cart-cta" href="/shop">Scopri la collezione</a></div>';
        return;
      }
      var subtotal = cart.reduce(function(s,i){ return s + (Number(i.price)||0)*(i.qty||1); }, 0);
      var totalQty = cart.reduce(function(s,i){ return s + (i.qty||1); }, 0);
      var countEl = document.getElementById('pageCount');
      if (countEl) countEl.textContent = totalQty + (totalQty === 1 ? ' articolo' : ' articoli');
      var remaining = Math.max(0, FREE_SHIP - subtotal);
      var progress = Math.min(100, subtotal/FREE_SHIP*100);

      var lines = cart.map(function(item){
        var p = resolveProduct(item.id);
        var href = p ? ('/product?id='+encodeURIComponent(p.id)) : '/shop';
        var img = imgOf(p);
        var parts = (item.variant||'').split(' · ');
        var color = parts[0]||'', size = parts[1]||'';
        var sizeless = SIZELESS.indexOf(catOf(p)) !== -1;
        var colorTag = color ? '<span class="cline-tag">'+esc(color)+'</span>' : '';
        var sizeTag = size ? '<span class="cline-tag">'+esc(size)+'</span>' : (sizeless ? '' : '<span class="cline-tag none">Taglia non sel.</span>');
        return '<div class="cline">' +
          '<a class="cline-img" href="'+href+'">'+(img?('<img src="'+esc(img)+'" alt="'+esc(item.name)+'" onerror="this.onerror=null;this.src=NO_IMAGE">'):phBox(item.color))+'</a>' +
          '<div class="cline-info">' +
            '<p class="cline-name"><a href="'+href+'">'+esc(item.name)+'</a></p>' +
            '<div class="cline-tags">'+colorTag+sizeTag+'</div>' +
            '<div class="qty"><button data-dec="'+esc(item.id)+'" aria-label="Diminuisci">−</button><span>'+(item.qty||1)+'</span><button data-inc="'+esc(item.id)+'" aria-label="Aumenta">+</button></div>' +
          '</div>' +
          '<div class="cline-right">' +
            '<span class="cline-price">'+money((Number(item.price)||0)*(item.qty||1))+'</span>' +
            '<button class="cline-remove" data-remove="'+esc(item.id)+'" aria-label="Rimuovi" title="Rimuovi"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16Z"/></svg></button>' +
          '</div>' +
        '</div>';
      }).join('');

      var shipNote = remaining > 0
        ? 'Aggiungi <strong>'+money(remaining)+'</strong> per la spedizione standard gratuita.'
        : '<span class="ok">✓ Hai la spedizione standard gratuita!</span>';

      root.innerHTML =
        '<div class="cart-layout">' +
          '<div class="cart-lines">'+lines+'</div>' +
          '<aside class="summary">' +
            '<h2>Riepilogo ordine</h2>' +
            '<div class="sum-row"><span>Subtotale</span><span>'+money(subtotal)+'</span></div>' +
            '<div class="ship-bar"><i style="width:'+progress+'%"></i></div>' +
            '<p class="ship-note">'+shipNote+'</p>' +
            '<div class="sum-row"><span>Spedizione</span><span>'+(remaining>0?money(STANDARD)+' (standard)':'Gratuita')+'</span></div>' +
            '<div class="sum-row total"><span>Totale stimato</span><span>'+money(subtotal + (remaining>0?STANDARD:0))+'</span></div>' +
            '<p class="ship-note" style="margin-top:.4rem">Spese di spedizione e sconti definitivi calcolati al checkout.</p>' +
            '<a class="btn-co" href="/checkout">Vai al checkout</a>' +
            '<p class="express-label">oppure checkout rapido</p>' +
            '<div class="express-row">' +
              '<button class="apple" data-express="applepay"><svg viewBox="0 0 24 24"><path d="M16.36 1.43c0 1.14-.47 2.16-1.24 2.9-.83.8-2 .19-1.24-.24C13.9 3.5 14.36 2.3 14.36 1.14c0-.15-.01-.3-.03-.14C15.44.2 16.36-.02 16.36 1.43zM19.7 17.1c-.35.8-.77 1.55-1.26 2.24-.67.94-1.22 1.6-1.65 1.96-.66.6-1.37.9-2.13.92-.55.01-1.2-.15-1.97-.48-.77-.33-1.48-.49-2.12-.49-.67 0-1.4.16-2.18.49-.79.33-1.42.5-1.9.51-.72.03-1.45-.28-2.18-.94-.46-.4-1.04-1.09-1.74-2.08-.75-1.06-1.37-2.3-1.85-3.71-.52-1.53-.78-3.02-.78-4.45 0-1.64.35-3.05 1.06-4.24.56-.95 1.3-1.7 2.23-2.25.93-.55 1.93-.83 3.02-.85.58 0 1.35.18 2.3.53.95.35 1.56.53 1.82.53.2 0 .87-.21 2.02-.62 1.09-.38 2-.54 2.75-.48 2.03.16 3.55.96 4.57 2.4-1.82 1.1-2.72 2.64-2.7 4.62.01 1.54.56 2.83 1.65 3.85.49.47 1.04.83 1.65 1.09-.13.39-.27.76-.43 1.13z"/></svg>Pay</button>' +
              '<button class="gpay" data-express="gpay"><span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>&nbsp;Pay</button>' +
              '<button class="paypal" data-express="paypal"><em>Pay</em>Pal</button>' +
            '</div>' +
            '<a class="cart-cont" href="/shop">Continua lo shopping</a>' +
          '</aside>' +
        '</div>';
    }

    document.addEventListener('click', function(e){
      var inc = e.target.closest('[data-inc]'); if(inc && window.appChangeQty){ window.appChangeQty(inc.getAttribute('data-inc'), 1); return; }
      var dec = e.target.closest('[data-dec]'); if(dec && window.appChangeQty){ window.appChangeQty(dec.getAttribute('data-dec'), -1); return; }
      var rm  = e.target.closest('[data-remove]'); if(rm && window.appRemove){ window.appRemove(rm.getAttribute('data-remove')); return; }
      var ex  = e.target.closest('[data-express]'); if(ex && window.appExpressCheckout){ window.appExpressCheckout(ex.getAttribute('data-express')); }
    });
    document.addEventListener('memi:cart:changed', render);

    function boot(){
      fetch('/api/products?limit=300').then(function(r){return r.json();}).then(function(res){
        products = Array.isArray(res)?res:(res&&res.products)||[];
      }).catch(function(){ products=[]; }).then(render);
    }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  })();
  </script>
</body>
</html>
