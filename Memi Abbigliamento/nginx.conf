# Preserve the client protocol from the upstream proxy (Traefik terminates TLS and sets
# X-Forwarded-Proto: https). Falling back to $scheme keeps direct/local http working.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy /api/* to the backend container ──────────────────
    # Defer DNS resolution so nginx doesn't crash if backend isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:3000;

    # ^~ gives this prefix PRIORITY over the regex asset-cache block below.
    # Without it, /api/uploads/<hash>.webp matches the \.webp$ regex location
    # and nginx tries to serve it from local disk (404 -> 404.html, ~5.3 kB)
    # instead of proxying to the backend that actually has the file.
    location ^~ /api/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 30s;
    }

    # ── Static files (HTML) ───────────────────────────────────────
    # HTML is never cached — must-revalidate so browsers always check
    # for updated pages after a deploy.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # ── Cache versioned static assets ────────────────────────────
    # JS/CSS/images use query-param versioning (e.g. app.js?v=5).
    # immutable tells browsers: this URL's content never changes.
    # Changing the version param forces a fresh fetch automatically.
    location ~* \.(css|js|png|jpg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # ── Apple Pay domain verification (Stripe) ───────────────────
    # Apple fetches this exact path over HTTPS when the domain is registered in the
    # Stripe dashboard (Settings → Payments → Apple Pay → Add domain). Served as-is.
    location = /.well-known/apple-developer-merchantid-domain-association {
        default_type text/plain;
        add_header Cache-Control "no-cache" always;
    }

    error_page 404 /404.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
}
